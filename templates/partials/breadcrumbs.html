{% if breadcrumbs %}
<nav class="breadcrumbs container" aria-label="Хлібні крихти">
  <ol class="breadcrumbs__list">
    <li class="breadcrumbs__item">
      <a href="{% url 'home' %}" class="breadcrumbs__link">Головна</a>
      <span class="breadcrumbs__sep">›</span>
    </li>
    {% for crumb in breadcrumbs %}
    <li class="breadcrumbs__item">
      {% if crumb.url %}
      <a href="{{ crumb.url }}" class="breadcrumbs__link">{{ crumb.label }}</a>
      {% else %}
      <span class="breadcrumbs__current">{{ crumb.label }}</span>
      {% endif %}
      {% if not forloop.last %}<span class="breadcrumbs__sep">›</span>{% endif %}
    </li>
    {% endfor %}
  </ol>
</nav>
{% endif %}
