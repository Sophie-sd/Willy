{% load static %}
<section class="hero-banner-section" aria-label="Акційні банери">
  <div class="hero-banner" data-hero-banner>
    <div class="hero-banner__viewport">
      <div class="hero-banner__track" data-hero-track>
        {% for slide in hero_slides %}
        <article class="hero-banner__slide" data-hero-slide>
          <div class="hero-banner__media">
            <img
              src="{% static slide.image %}"
              alt="{{ slide.title }}"
              width="1920"
              height="1080"
              loading="{% if forloop.first %}eager{% else %}lazy{% endif %}"
              decoding="async"
              {% if forloop.first %}fetchpriority="high"{% endif %}
              style="--hero-object-position: {{ slide.object_position|default:'center center' }}; --hero-object-fit: {{ slide.object_fit|default:'cover' }}"
            >
          </div>
          <div class="hero-banner__content">
            <h1 class="hero-banner__title">{{ slide.title }}</h1>
            <p class="hero-banner__subtitle">{{ slide.subtitle }}</p>
            <a href="{% url slide.cta_url_name %}" class="btn btn--primary hero-banner__cta">{{ slide.cta_text }}</a>
          </div>
        </article>
        {% endfor %}
      </div>
    </div>

    {% if hero_slides|length > 1 %}
    <button type="button" class="hero-banner__nav hero-banner__nav--prev" data-hero-prev aria-label="Попередній слайд">
      <img src="{% static 'images/ui/chevron.svg' %}" alt="">
    </button>
    <button type="button" class="hero-banner__nav hero-banner__nav--next" data-hero-next aria-label="Наступний слайд">
      <img src="{% static 'images/ui/chevron.svg' %}" alt="">
    </button>
    <div class="hero-banner__dots" data-hero-dots role="tablist" aria-label="Слайди банера"></div>
    {% endif %}
  </div>
</section>
