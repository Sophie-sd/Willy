{% load static catalog_tags %}
<div class="catalog-filters">
  <div class="catalog-filters__circles">
    <a href="{% url 'catalog:product_list' %}"
       class="catalog-filters__circle{% if not filter_category %} is-active{% endif %}"
       hx-get="{% url 'catalog:product_list' %}"
       hx-target="#catalog-results"
       hx-select="#catalog-results"
       hx-push-url="true">
      <div class="catalog-filters__circle-img">
        <img src="{% static 'images/placeholders/product.svg' %}" alt="Усі">
      </div>
      <span class="catalog-filters__circle-label">Усі</span>
    </a>
    {% for cat in categories %}
    <a href="{{ cat.get_absolute_url }}"
       class="catalog-filters__circle{% if filter_category == cat.slug %} is-active{% endif %}"
       hx-get="{{ cat.get_absolute_url }}"
       hx-target="#catalog-results"
       hx-select="#catalog-results"
       hx-push-url="true">
      <div class="catalog-filters__circle-img">
        {% if cat.image %}
        <img src="{{ cat.image.url }}" alt="{{ cat.name }}">
        {% else %}
        <img src="{% static cat.slug|category_placeholder %}" alt="{{ cat.name }}">
        {% endif %}
      </div>
      <span class="catalog-filters__circle-label">{{ cat.name }}</span>
    </a>
    {% endfor %}
  </div>

  <div class="catalog-toolbar">
    <span class="catalog-toolbar__count">{{ total_count }} {% if total_count == 1 %}товар{% elif total_count >= 2 and total_count <= 4 %}товари{% else %}товарів{% endif %}</span>
    <div class="catalog-toolbar__actions">
      <button type="button" class="catalog-toolbar__btn" data-filter-toggle aria-expanded="false">
        Фільтр
      </button>
      <select
        class="catalog-toolbar__select"
        name="sort"
        aria-label="Сортування"
        hx-get="{{ request.path }}"
        hx-include="[name='on_sale'], [name='price_min'], [name='price_max'], [name='q']"
        hx-target="#catalog-results"
        hx-select="#catalog-results"
        hx-push-url="true"
      >
        <option value="newest" {% if current_sort == 'newest' %}selected{% endif %}>Новинки</option>
        <option value="price_asc" {% if current_sort == 'price_asc' %}selected{% endif %}>Ціна ↑</option>
        <option value="price_desc" {% if current_sort == 'price_desc' %}selected{% endif %}>Ціна ↓</option>
        <option value="popular" {% if current_sort == 'popular' %}selected{% endif %}>Популярні</option>
      </select>
    </div>
  </div>

  <form
    class="catalog-filters-panel"
    data-filter-panel
    hx-get="{{ request.path }}"
    hx-target="#catalog-results"
    hx-select="#catalog-results"
    hx-push-url="true"
    hx-trigger="change delay:300ms"
  >
    <input type="hidden" name="sort" value="{{ current_sort }}">
    <div class="catalog-filters-panel__group">
      <label class="catalog-filters-panel__label" for="price_min">Ціна від</label>
      <input type="number" id="price_min" name="price_min" class="catalog-filters-panel__input"
             value="{{ filter_price_min }}" min="0" placeholder="0">
    </div>
    <div class="catalog-filters-panel__group">
      <label class="catalog-filters-panel__label" for="price_max">Ціна до</label>
      <input type="number" id="price_max" name="price_max" class="catalog-filters-panel__input"
             value="{{ filter_price_max }}" min="0" placeholder="9999">
    </div>
    <div class="catalog-filters-panel__group">
      <label class="catalog-filters-panel__checkbox">
        <input type="checkbox" name="on_sale" value="1" {% if filter_on_sale == '1' %}checked{% endif %}>
        Лише акційні
      </label>
    </div>
    {% if search_query %}
    <input type="hidden" name="q" value="{{ search_query }}">
    {% endif %}
  </form>
</div>
