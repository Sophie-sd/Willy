databases:
  - name: zoowilli-db
    plan: free
    databaseName: zoowilli
    user: zoowilli

services:
  - type: web
    name: zoowilli
    runtime: python
    plan: free
    branch: main
    buildCommand: './build.sh'
    startCommand: 'gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120'
    envVars:
      - key: PYTHON_VERSION
        value: '3.12.8'
      - key: DEBUG
        value: 'false'
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: zoowilli-db
          property: connectionString
      - key: WEB_CONCURRENCY
        value: '2'
